name: CIP Desktop CI

on:
  push:
    branches: ["main", "claude/**"]
    paths: ["cip-desktop/**", ".github/workflows/cip-desktop-ci.yml"]
  pull_request:
    paths: ["cip-desktop/**", ".github/workflows/cip-desktop-ci.yml"]

defaults:
  run:
    working-directory: cip-desktop

jobs:
  rust:
    name: Rust core (check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cip-desktop/src-tauri
      - name: cargo test (vault schema + logic)
        working-directory: cip-desktop/src-tauri
        run: cargo test --lib

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Type-check + build
        run: npm run build

  dmg:
    name: macOS bundle (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cip-desktop/src-tauri
      - run: npm install
      - name: Build DMG (unsigned)
        run: npm run tauri build -- --bundles dmg
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: cip-desktop-dmg
          path: cip-desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
