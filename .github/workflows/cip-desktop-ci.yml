name: CIP Desktop CI

on:
  push:
    branches: ["main", "claude/**"]
    paths: ["cip-desktop/**", ".github/workflows/cip-desktop-ci.yml"]
  pull_request:
    paths: ["cip-desktop/**", ".github/workflows/cip-desktop-ci.yml"]

defaults:
  run:
    working-directory: cip-desktop

jobs:
  rust:
    name: Rust core (check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cip-desktop/src-tauri
      - name: cargo test (vault schema + logic)
        working-directory: cip-desktop/src-tauri
        run: cargo test --lib

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Type-check + build
        run: npm run build
