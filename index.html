<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>SupaBrain Kanban</title>

<!-- PWA Meta -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kanban">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="kanban-icon.svg">
<link rel="icon" type="image/svg+xml" href="kanban-icon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ================================================================
   CSS VARIABLES
   ================================================================ */
:root {
  --bg: #0d1117; --surface: #161b22; --card-bg: #1c2233; --card-border: #2a2f42;
  --card-hover-border: #3d4463; --text: #e6edf3; --text-muted: #8b949e; --text-dim: #545d6c;
  --border: #21262d; --divider: #2a2f42; --accent-blue: #58a6ff; --accent-green: #3fb950;
  --accent-red: #f85149; --accent-orange: #d29922; --accent-purple: #8b5cf6;
  --accent-teal: #2dd4bf; --accent-yellow: #e3b341; --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3); --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
  /* Safe area insets for iOS */
  --sai-top: env(safe-area-inset-top, 0px);
  --sai-bottom: env(safe-area-inset-bottom, 0px);
  --sai-left: env(safe-area-inset-left, 0px);
  --sai-right: env(safe-area-inset-right, 0px);
  --tab-bar-height: 56px;
  --header-height: 56px;
}

/* ================================================================
   RESET & BASE
   ================================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  height: 100%; overflow: hidden;
  /* Prevent iOS bounce/overscroll */
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  position: fixed; width: 100%; top: 0; left: 0;
}

/* ================================================================
   LOGIN
   ================================================================ */
#login-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  z-index: 2000; padding: 20px;
  padding-top: calc(20px + var(--sai-top));
}
#login-overlay.hidden { display: none; }
.login-card {
  background: var(--surface); border: 1px solid var(--card-border);
  border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.login-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-card .login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.login-field { margin-bottom: 16px; }
.login-field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
.login-field input {
  width: 100%; padding: 12px 14px; background: var(--bg);
  border: 1px solid var(--card-border); border-radius: 10px; color: var(--text);
  font-size: 16px; outline: none; /* 16px prevents iOS zoom */
  -webkit-appearance: none;
}
.login-field input:focus { border-color: var(--accent-blue); }
.login-btn {
  width: 100%; padding: 14px; background: var(--accent-blue); color: #fff;
  border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
  cursor: pointer; margin-top: 8px; -webkit-appearance: none;
}
.login-btn:disabled { opacity: 0.5; }
.login-btn:active { transform: scale(0.98); }
.login-error { color: var(--accent-red); font-size: 13px; margin-top: 12px; display: none; }

/* ================================================================
   APP SHELL
   ================================================================ */
#app { display: none; height: 100%; }
#app.visible { display: flex; flex-direction: column; }

/* ================================================================
   HEADER (compact mobile)
   ================================================================ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  padding-top: 10px;
  border-bottom: 1px solid var(--divider); background: var(--surface);
  flex-shrink: 0; z-index: 100; min-height: var(--header-height);
}
.header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.header-left h1 { font-size: 17px; font-weight: 700; white-space: nowrap; }
.project-select {
  background: var(--bg); border: 1px solid var(--card-border); color: var(--text);
  padding: 6px 10px; border-radius: 8px; font-size: 13px; cursor: pointer;
  outline: none; max-width: 140px; flex-shrink: 1; min-width: 0;
}
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Icon buttons for mobile */
.icon-btn {
  background: none; border: 1px solid var(--card-border); color: var(--text-muted);
  width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  transition: all 0.15s; flex-shrink: 0;
}
.icon-btn:active { background: var(--card-bg); transform: scale(0.95); }
.icon-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); }

/* Filters panel (hidden by default on mobile) */
.filters-panel {
  display: none; padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--divider); gap: 8px; flex-wrap: wrap;
}
.filters-panel.open { display: flex; }
.filters-panel input, .filters-panel select {
  background: var(--bg); border: 1px solid var(--card-border); color: var(--text);
  padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none;
  flex: 1; min-width: 120px;
}
.filters-panel input:focus, .filters-panel select:focus { border-color: var(--accent-blue); }

/* ================================================================
   WEEK FILTER STRIP
   ================================================================ */
.week-strip {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 8px 16px;
  background: var(--surface); border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
}
.week-btn {
  background: var(--card-bg); border: 1px solid var(--card-border);
  color: var(--text); min-width: 44px; height: 44px; border-radius: 8px;
  font-size: 22px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.week-btn:active { background: var(--bg); transform: scale(0.95); }
.week-label {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; min-width: 150px; text-align: center;
}
.week-all-btn {
  background: var(--card-bg); border: 1px solid var(--card-border);
  color: var(--text-muted); padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; min-height: 44px;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.week-all-btn:active { background: var(--bg); transform: scale(0.95); }
.week-all-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(88,166,255,0.08); }

/* ================================================================
   OFFLINE INDICATOR
   ================================================================ */
.offline-bar {
  display: none; background: var(--accent-orange); color: #000;
  text-align: center; padding: 4px; font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.offline-bar.visible { display: block; }

/* ================================================================
   CARD LIST (main content area)
   ================================================================ */
.card-list-container {
  flex: 1; overflow: hidden; position: relative;
}
.card-list {
  height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--tab-bar-height) + var(--sai-bottom));
  overscroll-behavior-y: contain;
}

/* Pull-to-refresh indicator */
.pull-indicator {
  text-align: center; padding: 12px; color: var(--accent-blue);
  font-size: 13px; font-weight: 500; display: none;
}
.pull-indicator.visible { display: block; }

/* Column header inside card list */
.list-column-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; margin-bottom: 8px;
}
.list-column-title {
  font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.list-column-count {
  font-size: 12px; font-weight: 600; background: var(--card-bg); color: var(--text-muted);
  padding: 2px 10px; border-radius: 10px;
}

/* ================================================================
   CARDS (mobile optimized)
   ================================================================ */
.card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  transition: transform 0.2s ease, opacity 0.2s ease, background 0.15s;
  user-select: none; position: relative; overflow: hidden;
  /* Touch feedback */
  -webkit-tap-highlight-color: transparent;
}
.card:active { background: #242b3d; }
.card.swiping { transition: none; }
.card.swipe-right { background: rgba(63, 185, 80, 0.1); border-color: var(--accent-green); }
.card.swipe-left { background: rgba(248, 81, 73, 0.1); border-color: var(--accent-red); }

/* Swipe action indicators */
.card .swipe-action {
  position: absolute; top: 0; bottom: 0; width: 80px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; opacity: 0; transition: opacity 0.15s;
  pointer-events: none;
}
.card .swipe-action.left { left: 0; color: var(--accent-red); }
.card .swipe-action.right { right: 0; color: var(--accent-green); }
.card.swipe-right .swipe-action.right { opacity: 1; }
.card.swipe-left .swipe-action.left { opacity: 1; }

.card-inner { position: relative; z-index: 1; }
.card-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
.card-description {
  font-size: 13px; color: var(--text-muted); line-height: 1.4;
  margin-bottom: 8px; display: none;
  /* Clamp to 2 lines */
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-description:empty { display: none; }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.card-project-tag {
  font-size: 11px; color: var(--text-dim); background: var(--surface);
  padding: 3px 8px; border-radius: 6px; border: 1px solid var(--card-border);
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.priority-critical { background: #f85149; }
.priority-high { background: #d29922; }
.priority-medium { background: #58a6ff; }
.priority-low { background: #8b949e; }
.card-labels { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.card-label {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; color: #fff;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text-dim);
}
.card-due { display: flex; align-items: center; gap: 4px; }
.card-due.overdue { color: var(--accent-red); }
.card-comments { display: flex; align-items: center; gap: 4px; }
.card-assignee { font-size: 11px; color: var(--text-dim); }
.card-type-badge {
  font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
  color: #fff; white-space: nowrap; display: inline-flex; align-items: center; gap: 2px;
}
.type-bug { background: #f85149; }
.type-user_story { background: #8b5cf6; }
.type-requirement { background: #58a6ff; }
.type-spike { background: #d29922; }
.type-chore { background: #545d6c; }
.type-epic { background: #3fb950; }
.card-ticket-code {
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.3px;
}
.card-swipe-hint {
  font-size: 11px; color: var(--text-dim); text-align: center;
  padding: 2px; opacity: 0; transition: opacity 0.2s;
}
.card-parent { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-progress-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.card-progress { height: 4px; background: var(--card-border); border-radius: 2px; overflow: hidden; flex: 1; max-width: 120px; }
.card-progress-fill { height: 100%; background: var(--accent-green); border-radius: 2px; transition: width 0.2s; }
.card-progress-text { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
.card-blocked { font-size: 10px; font-weight: 600; color: var(--accent-red); display: inline-flex; align-items: center; gap: 2px; }
.card.is-blocked { opacity: 0.7; }

/* Empty column state */
.empty-column {
  text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px;
}

/* Add card FAB */
.fab {
  position: fixed; right: 20px;
  bottom: calc(var(--tab-bar-height) + 16px + var(--sai-bottom));
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent-blue); color: #fff; border: none;
  font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(88,166,255,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 90; transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.fab:active { transform: scale(0.9); }

/* ================================================================
   BOTTOM TAB BAR
   ================================================================ */
.tab-bar {
  display: flex; background: var(--surface); border-top: 1px solid var(--divider);
  flex-shrink: 0; z-index: 100; position: relative;
  padding-bottom: var(--sai-bottom);
}
.tab-bar-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 8px 4px; background: none; border: none;
  color: var(--text-dim); font-size: 10px; font-weight: 500; cursor: pointer;
  transition: color 0.15s; -webkit-tap-highlight-color: transparent;
  gap: 2px;
}
.tab-bar-btn .tab-icon { font-size: 20px; line-height: 1; }
.tab-bar-btn .tab-count {
  font-size: 9px; background: var(--card-bg); padding: 0 5px; border-radius: 8px;
  min-width: 16px; text-align: center;
}
.tab-bar-btn.active { color: var(--accent-blue); }
.tab-bar-btn.active .tab-count { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
/* Per-status active colors */
.tab-bar-btn.active[data-status="backlog"] { color: #8b949e; }
.tab-bar-btn.active[data-status="todo"] { color: #58a6ff; }
.tab-bar-btn.active[data-status="in_progress"] { color: #8b5cf6; }
.tab-bar-btn.active[data-status="review"] { color: #d29922; }
.tab-bar-btn.active[data-status="done"] { color: #3fb950; }

/* ================================================================
   MODAL (fullscreen on mobile)
   ================================================================ */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 1000;
}
.modal-overlay.active { display: flex; align-items: flex-end; }
.modal {
  background: var(--surface); width: 100%; height: 100%;
  border-radius: 0; display: flex; flex-direction: column;
  padding-top: var(--sai-top);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--divider); flex-shrink: 0;
}
.modal-header h2 { font-size: 17px; font-weight: 600; flex: 1; }
.modal-close {
  background: none; border: none; color: var(--text-muted); font-size: 28px;
  cursor: pointer; padding: 4px 8px; border-radius: 6px; line-height: 1;
  min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
}
.modal-close:active { background: var(--card-bg); }
.modal-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px; padding-bottom: calc(16px + var(--sai-bottom));
}
.modal-row { display: flex; gap: 12px; margin-bottom: 14px; }
.modal-field { flex: 1; }
.modal-field label {
  display: block; font-size: 12px; font-weight: 500; color: var(--text-muted);
  margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
}
.modal-field input, .modal-field select, .modal-field textarea {
  width: 100%; padding: 10px 12px; background: var(--bg);
  border: 1px solid var(--card-border); border-radius: 10px;
  color: var(--text); font-size: 16px; outline: none; font-family: inherit;
  -webkit-appearance: none;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
  border-color: var(--accent-blue);
}
.modal-field textarea { min-height: 80px; resize: vertical; }
.modal-labels { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.label-chip {
  font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px;
  cursor: pointer; border: 2px solid transparent; color: #fff; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.label-chip.selected { border-color: #fff; }
.label-chip:active { transform: scale(0.95); }
.modal-actions {
  display: flex; gap: 8px; justify-content: flex-end; padding-top: 14px;
  border-top: 1px solid var(--divider); margin-top: 16px;
}
.btn {
  background: var(--surface); border: 1px solid var(--card-border); color: var(--text);
  padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px;
  min-height: 44px; -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
.btn-delete { background: rgba(248,81,73,0.1); color: #f85149; border-color: rgba(248,81,73,0.2); }
.btn-delete:active { background: rgba(248,81,73,0.2); }

/* Comments */
.comments-section { margin-top: 16px; border-top: 1px solid var(--divider); padding-top: 14px; }
.comments-section h3 {
  font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.comment {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 10px; padding: 12px; margin-bottom: 8px;
}
.comment-body { font-size: 14px; line-height: 1.5; }
.comment-date { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
.comment-input-row input { flex: 1; }

/* ================================================================
   TOAST
   ================================================================ */
.toast {
  position: fixed; bottom: calc(var(--tab-bar-height) + 20px + var(--sai-bottom));
  left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 500;
  color: white; z-index: 2000; animation: toastIn 0.3s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.success { background: #1a7f37; }
.toast.error { background: #c62828; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ================================================================
   LOADING
   ================================================================ */
.loading {
  text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 15px;
}

/* ================================================================
   HAPTIC FEEDBACK ANIMATION
   ================================================================ */
@keyframes hapticPulse {
  0% { transform: scale(1); }
  50% { transform: scale(0.97); }
  100% { transform: scale(1); }
}
.haptic { animation: hapticPulse 0.15s ease-in-out; }

/* ================================================================
   DESKTOP OVERRIDES (> 768px)
   ================================================================ */
@media (min-width: 769px) {
  html, body { overflow: auto; position: static; }
  body { height: auto; min-height: 100vh; }
  
  .header { padding: 14px 24px; }
  .header-left h1 { font-size: 20px; }
  .project-select { max-width: 280px; }
  
  .filters-panel { display: flex !important; padding: 10px 24px; }
  .toggle-filters-btn { display: none !important; }
  
  .tab-bar { display: none; }
  .fab { display: none; }
  
  /* Show desktop board */
  .card-list-container { display: none !important; }
  .desktop-board {
    display: flex !important; gap: 14px; padding: 20px 24px;
    flex: 1; align-items: flex-start; overflow-x: auto;
  }
  .desktop-board .column {
    background: var(--surface); border: 1px solid var(--card-border);
    border-radius: var(--radius); width: 280px; min-width: 280px; flex-shrink: 0;
    display: flex; flex-direction: column; max-height: calc(100vh - 210px);
  }
  .desktop-board .column-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid var(--divider);
  }
  .desktop-board .column-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .desktop-board .column-count {
    font-size: 11px; font-weight: 600; background: var(--card-bg); color: var(--text-muted);
    padding: 2px 8px; border-radius: 10px;
  }
  .desktop-board .column-body { padding: 8px; overflow-y: auto; flex: 1; min-height: 60px; }
  .desktop-board .col-backlog .column-title { color: #8b949e; }
  .desktop-board .col-todo .column-title { color: #58a6ff; }
  .desktop-board .col-in_progress .column-title { color: #8b5cf6; }
  .desktop-board .col-review .column-title { color: #d29922; }
  .desktop-board .col-done .column-title { color: #3fb950; }
  .desktop-board .card { cursor: grab; padding: 12px; }
  .desktop-board .card.dragging { opacity: 0.5; transform: rotate(2deg); }
