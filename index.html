<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>SupaBrain Kanban</title>

<!-- PWA Meta -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kanban">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="kanban-icon.svg">
<link rel="icon" type="image/svg+xml" href="kanban-icon.svg">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ================================================================
   CSS VARIABLES
   ================================================================ */
:root {
  --bg: #0d1117; --surface: #161b22; --card-bg: #1c2233; --card-border: #2a2f42;
  --card-hover-border: #3d4463; --text: #e6edf3; --text-muted: #8b949e; --text-dim: #545d6c;
  --border: #21262d; --divider: #2a2f42; --accent-blue: #58a6ff; --accent-green: #3fb950;
  --accent-red: #f85149; --accent-orange: #d29922; --accent-purple: #8b5cf6;
  --accent-teal: #2dd4bf; --accent-yellow: #e3b341; --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3); --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
  /* Safe area insets for iOS */
  --sai-top: env(safe-area-inset-top, 0px);
  --sai-bottom: env(safe-area-inset-bottom, 0px);
  --sai-left: env(safe-area-inset-left, 0px);
  --sai-right: env(safe-area-inset-right, 0px);
  --tab-bar-height: 56px;
  --header-height: 56px;
}

/* ================================================================
   RESET & BASE
   ================================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  height: 100%; overflow: hidden;
  /* Prevent iOS bounce/overscroll */
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  position: fixed; width: 100%; top: 0; left: 0;
}

/* ================================================================
   LOGIN
   ================================================================ */
#login-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  z-index: 2000; padding: 20px;
  padding-top: calc(20px + var(--sai-top));
}
#login-overlay.hidden { display: none; }
.login-card {
  background: var(--surface); border: 1px solid var(--card-border);
  border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.login-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-card .login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.login-field { margin-bottom: 16px; }
.login-field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
.login-field input {
  width: 100%; padding: 12px 14px; background: var(--bg);
  border: 1px solid var(--card-border); border-radius: 10px; color: var(--text);
  font-size: 16px; outline: none; /* 16px prevents iOS zoom */
  -webkit-appearance: none;
}
.login-field input:focus { border-color: var(--accent-blue); }
.login-btn {
  width: 100%; padding: 14px; background: var(--accent-blue); color: #fff;
  border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
  cursor: pointer; margin-top: 8px; -webkit-appearance: none;
}
.login-btn:disabled { opacity: 0.5; }
.login-btn:active { transform: scale(0.98); }
.login-error { color: var(--accent-red); font-size: 13px; margin-top: 12px; display: none; }

/* ================================================================
   APP SHELL
   ================================================================ */
#app { display: none; height: 100%; }
#app.visible { display: flex; flex-direction: column; }

/* ================================================================
   HEADER (compact mobile)
   ================================================================ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  padding-top: calc(10px + var(--sai-top));
  border-bottom: 1px solid var(--divider); background: var(--surface);
  flex-shrink: 0; z-index: 100; min-height: var(--header-height);
}
.header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.header-left h1 { font-size: 17px; font-weight: 700; white-space: nowrap; }
.project-select {
  background: var(--bg); border: 1px solid var(--card-border); color: var(--text);
  padding: 6px 10px; border-radius: 8px; font-size: 13px; cursor: pointer;
  outline: none; max-width: 140px; flex-shrink: 1; min-width: 0;
}
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Icon buttons for mobile */
.icon-btn {
  background: none; border: 1px solid var(--card-border); color: var(--text-muted);
  width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  transition: all 0.15s; flex-shrink: 0;
}
.icon-btn:active { background: var(--card-bg); transform: scale(0.95); }
.icon-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); }

/* Filters panel (hidden by default on mobile) */
.filters-panel {
  display: none; padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--divider); gap: 8px; flex-wrap: wrap;
}
.filters-panel.open { display: flex; }
.filters-panel input, .filters-panel select {
  background: var(--bg); border: 1px solid var(--card-border); color: var(--text);
  padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none;
  flex: 1; min-width: 120px;
}
.filters-panel input:focus, .filters-panel select:focus { border-color: var(--accent-blue); }

/* ================================================================
   WEEK FILTER STRIP
   ================================================================ */
.week-strip {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 8px 16px;
  background: var(--surface); border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
}
.week-btn {
  background: var(--card-bg); border: 1px solid var(--card-border);
  color: var(--text); min-width: 44px; height: 44px; border-radius: 8px;
  font-size: 22px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.week-btn:active { background: var(--bg); transform: scale(0.95); }
.week-label {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; min-width: 150px; text-align: center;
}
.week-all-btn {
  background: var(--card-bg); border: 1px solid var(--card-border);
  color: var(--text-muted); padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; min-height: 44px;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.week-all-btn:active { background: var(--bg); transform: scale(0.95); }
.week-all-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(88,166,255,0.08); }

/* ================================================================
   OFFLINE INDICATOR
   ================================================================ */
.offline-bar {
  display: none; background: var(--accent-orange); color: #000;
  text-align: center; padding: 4px; font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.offline-bar.visible { display: block; }

/* ================================================================
   CARD LIST (main content area)
   ================================================================ */
.card-list-container {
  flex: 1; overflow: hidden; position: relative;
}
.card-list {
  height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--tab-bar-height) + var(--sai-bottom));
  overscroll-behavior-y: contain;
}

/* Pull-to-refresh indicator */
.pull-indicator {
  text-align: center; padding: 12px; color: var(--accent-blue);
  font-size: 13px; font-weight: 500; display: none;
}
.pull-indicator.visible { display: block; }

/* Column header inside card list */
.list-column-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; margin-bottom: 8px;
}
.list-column-title {
  font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.list-column-count {
  font-size: 12px; font-weight: 600; background: var(--card-bg); color: var(--text-muted);
  padding: 2px 10px; border-radius: 10px;
}

/* ================================================================
   CARDS (mobile optimized)
   ================================================================ */
.card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  transition: transform 0.2s ease, opacity 0.2s ease, background 0.15s;
  user-select: none; position: relative; overflow: hidden;
  /* Touch feedback */
  -webkit-tap-highlight-color: transparent;
}
.card:active { background: #242b3d; }
.card.swiping { transition: none; }
.card.swipe-right { background: rgba(63, 185, 80, 0.1); border-color: var(--accent-green); }
.card.swipe-left { background: rgba(248, 81, 73, 0.1); border-color: var(--accent-red); }

/* Swipe action indicators */
.card .swipe-action {
  position: absolute; top: 0; bottom: 0; width: 80px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; opacity: 0; transition: opacity 0.15s;
  pointer-events: none;
}
.card .swipe-action.left { left: 0; color: var(--accent-red); }
.card .swipe-action.right { right: 0; color: var(--accent-green); }
.card.swipe-right .swipe-action.right { opacity: 1; }
.card.swipe-left .swipe-action.left { opacity: 1; }

.card-inner { position: relative; z-index: 1; }
.card-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
.card-description {
  font-size: 13px; color: var(--text-muted); line-height: 1.4;
  margin-bottom: 8px; display: none;
  /* Clamp to 2 lines */
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-description:empty { display: none; }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.card-project-tag {
  font-size: 11px; color: var(--text-dim); background: var(--surface);
  padding: 3px 8px; border-radius: 6px; border: 1px solid var(--card-border);
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.priority-critical { background: #f85149; }
.priority-high { background: #d29922; }
.priority-medium { background: #58a6ff; }
.priority-low { background: #8b949e; }
.card-labels { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.card-label {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; color: #fff;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text-dim);
}
.card-due { display: flex; align-items: center; gap: 4px; }
.card-due.overdue { color: var(--accent-red); }
.card-comments { display: flex; align-items: center; gap: 4px; }
.card-assignee { font-size: 11px; color: var(--text-dim); }
.card-type-badge {
  font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
  color: #fff; white-space: nowrap; display: inline-flex; align-items: center; gap: 2px;
}
.type-bug { background: #f85149; }
.type-user_story { background: #8b5cf6; }
.type-requirement { background: #58a6ff; }
.type-spike { background: #d29922; }
.type-chore { background: #545d6c; }
.type-epic { background: #3fb950; }
.card-swipe-hint {
  font-size: 11px; color: var(--text-dim); text-align: center;
  padding: 2px; opacity: 0; transition: opacity 0.2s;
}

/* Empty column state */
.empty-column {
  text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px;
}

/* Add card FAB */
.fab {
  position: fixed; right: 20px;
  bottom: calc(var(--tab-bar-height) + 16px + var(--sai-bottom));
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent-blue); color: #fff; border: none;
  font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(88,166,255,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 90; transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.fab:active { transform: scale(0.9); }

/* ================================================================
   BOTTOM TAB BAR
   ================================================================ */
.tab-bar {
  display: flex; background: var(--surface); border-top: 1px solid var(--divider);
  flex-shrink: 0; z-index: 100; position: relative;
  padding-bottom: var(--sai-bottom);
}
.tab-bar-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 8px 4px; background: none; border: none;
  color: var(--text-dim); font-size: 10px; font-weight: 500; cursor: pointer;
  transition: color 0.15s; -webkit-tap-highlight-color: transparent;
  gap: 2px;
}
.tab-bar-btn .tab-icon { font-size: 20px; line-height: 1; }
.tab-bar-btn .tab-count {
  font-size: 9px; background: var(--card-bg); padding: 0 5px; border-radius: 8px;
  min-width: 16px; text-align: center;
}
.tab-bar-btn.active { color: var(--accent-blue); }
.tab-bar-btn.active .tab-count { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
/* Per-status active colors */
.tab-bar-btn.active[data-status="backlog"] { color: #8b949e; }
.tab-bar-btn.active[data-status="todo"] { color: #58a6ff; }
.tab-bar-btn.active[data-status="in_progress"] { color: #8b5cf6; }
.tab-bar-btn.active[data-status="review"] { color: #d29922; }
.tab-bar-btn.active[data-status="done"] { color: #3fb950; }

/* ================================================================
   MODAL (fullscreen on mobile)
   ================================================================ */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 1000;
}
.modal-overlay.active { display: flex; align-items: flex-end; }
.modal {
  background: var(--surface); width: 100%; height: 100%;
  border-radius: 0; display: flex; flex-direction: column;
  padding-top: var(--sai-top);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--divider); flex-shrink: 0;
}
.modal-header h2 { font-size: 17px; font-weight: 600; flex: 1; }
.modal-close {
  background: none; border: none; color: var(--text-muted); font-size: 28px;
  cursor: pointer; padding: 4px 8px; border-radius: 6px; line-height: 1;
  min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
}
.modal-close:active { background: var(--card-bg); }
.modal-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px; padding-bottom: calc(16px + var(--sai-bottom));
}
.modal-row { display: flex; gap: 12px; margin-bottom: 14px; }
.modal-field { flex: 1; }
.modal-field label {
  display: block; font-size: 12px; font-weight: 500; color: var(--text-muted);
  margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
}
.modal-field input, .modal-field select, .modal-field textarea {
  width: 100%; padding: 10px 12px; background: var(--bg);
  border: 1px solid var(--card-border); border-radius: 10px;
  color: var(--text); font-size: 16px; outline: none; font-family: inherit;
  -webkit-appearance: none;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
  border-color: var(--accent-blue);
}
.modal-field textarea { min-height: 80px; resize: vertical; }
.modal-labels { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.label-chip {
  font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px;
  cursor: pointer; border: 2px solid transparent; color: #fff; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.label-chip.selected { border-color: #fff; }
.label-chip:active { transform: scale(0.95); }
.modal-actions {
  display: flex; gap: 8px; justify-content: flex-end; padding-top: 14px;
  border-top: 1px solid var(--divider); margin-top: 16px;
}
.btn {
  background: var(--surface); border: 1px solid var(--card-border); color: var(--text);
  padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px;
  min-height: 44px; -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
.btn-delete { background: rgba(248,81,73,0.1); color: #f85149; border-color: rgba(248,81,73,0.2); }
.btn-delete:active { background: rgba(248,81,73,0.2); }

/* Comments */
.comments-section { margin-top: 16px; border-top: 1px solid var(--divider); padding-top: 14px; }
.comments-section h3 {
  font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.comment {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 10px; padding: 12px; margin-bottom: 8px;
}
.comment-body { font-size: 14px; line-height: 1.5; }
.comment-date { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
.comment-input-row input { flex: 1; }

/* ================================================================
   TOAST
   ================================================================ */
.toast {
  position: fixed; bottom: calc(var(--tab-bar-height) + 20px + var(--sai-bottom));
  left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 500;
  color: white; z-index: 2000; animation: toastIn 0.3s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.success { background: #1a7f37; }
.toast.error { background: #c62828; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ================================================================
   LOADING
   ================================================================ */
.loading {
  text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 15px;
}

/* ================================================================
   HAPTIC FEEDBACK ANIMATION
   ================================================================ */
@keyframes hapticPulse {
  0% { transform: scale(1); }
  50% { transform: scale(0.97); }
  100% { transform: scale(1); }
}
.haptic { animation: hapticPulse 0.15s ease-in-out; }

/* ================================================================
   DESKTOP OVERRIDES (> 768px)
   ================================================================ */
@media (min-width: 769px) {
  html, body { overflow: auto; position: static; }
  body { height: auto; min-height: 100vh; }
  
  .header { padding: 14px 24px; }
  .header-left h1 { font-size: 20px; }
  .project-select { max-width: 280px; }
  
  .filters-panel { display: flex !important; padding: 10px 24px; }
  .toggle-filters-btn { display: none !important; }
  
  .tab-bar { display: none; }
  .fab { display: none; }
  
  /* Show desktop board */
  .card-list-container { display: none !important; }
  .desktop-board {
    display: flex !important; gap: 14px; padding: 20px 24px;
    flex: 1; align-items: flex-start; overflow-x: auto;
  }
  .desktop-board .column {
    background: var(--surface); border: 1px solid var(--card-border);
    border-radius: var(--radius); width: 280px; min-width: 280px; flex-shrink: 0;
    display: flex; flex-direction: column; max-height: calc(100vh - 210px);
  }
  .desktop-board .column-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid var(--divider);
  }
  .desktop-board .column-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .desktop-board .column-count {
    font-size: 11px; font-weight: 600; background: var(--card-bg); color: var(--text-muted);
    padding: 2px 8px; border-radius: 10px;
  }
  .desktop-board .column-body { padding: 8px; overflow-y: auto; flex: 1; min-height: 60px; }
  .desktop-board .col-backlog .column-title { color: #8b949e; }
  .desktop-board .col-todo .column-title { color: #58a6ff; }
  .desktop-board .col-in_progress .column-title { color: #8b5cf6; }
  .desktop-board .col-review .column-title { color: #d29922; }
  .desktop-board .col-done .column-title { color: #3fb950; }
  .desktop-board .card { cursor: grab; padding: 12px; }
  .desktop-board .card.dragging { opacity: 0.5; transform: rotate(2deg); }
  .desktop-board .add-card-btn {
    width: 100%; padding: 8px; background: transparent;
    border: 1px dashed var(--card-border); border-radius: 8px;
    color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all 0.15s; margin-top: 4px;
  }
  .desktop-board .add-card-btn:hover {
    border-color: var(--accent-blue); color: var(--accent-blue);
    background: rgba(88,166,255,0.05);
  }

  /* Modal: centered dialog on desktop */
  .modal-overlay.active { align-items: center; justify-content: center; }
  .modal {
    max-width: 600px; max-height: 85vh; height: auto;
    border-radius: 14px; padding-top: 0;
  }

  .btn-new-desktop { display: flex !important; }
  .btn-logout-desktop { display: flex !important; }
}

/* Hide desktop elements on mobile */
.desktop-board { display: none; }
.btn-new-desktop { display: none !important; }
.btn-logout-desktop { display: none !important; }

/* ================================================================
   STANDALONE MODE TWEAKS (added to home screen)
   ================================================================ */
@media (display-mode: standalone) {
  .header { padding-top: calc(12px + var(--sai-top)); }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-overlay">
  <div class="login-card">
    <h2>SupaBrain Kanban</h2>
    <div class="login-sub">Sign in to manage your work items</div>
    <form id="login-form">
      <div class="login-field"><label>Email</label><input type="email" id="login-email" required autocomplete="email"></div>
      <div class="login-field"><label>Password</label><input type="password" id="login-password" required autocomplete="current-password"></div>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Kanban</h1>
      <select class="project-select" id="project-select"><option value="all">All Projects</option></select>
    </div>
    <div class="header-right">
      <button class="icon-btn toggle-filters-btn" id="toggle-filters" title="Filters">&#x1F50D;</button>
      <button class="icon-btn" id="btn-refresh" title="Refresh">&#x21bb;</button>
      <button class="btn btn-primary btn-new-desktop" id="btn-new-desktop" style="font-size:13px;padding:7px 14px;min-height:auto;">+ New</button>
      <button class="btn btn-logout-desktop" id="btn-logout-desktop" style="font-size:12px;color:var(--text-muted);padding:7px 12px;min-height:auto;">Sign Out</button>
    </div>
  </div>

  <!-- Filters (collapsed on mobile) -->
  <div class="filters-panel" id="filters-panel">
    <input type="text" id="search-input" placeholder="Search cards...">
    <select id="priority-filter">
      <option value="all">All Priorities</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select id="type-filter">
      <option value="all">All Types</option>
      <option value="task">Tasks</option>
      <option value="bug">Bugs</option>
      <option value="user_story">User Stories</option>
      <option value="requirement">Requirements</option>
      <option value="spike">Spikes</option>
      <option value="chore">Chores</option>
      <option value="epic">Epics</option>
    </select>
    <button class="btn" id="btn-logout-mobile" style="font-size:12px;color:var(--text-muted);padding:7px 12px;min-height:36px;">Sign Out</button>
  </div>

  <!-- Offline indicator -->
  <div class="offline-bar" id="offline-bar">You're offline — changes will sync when reconnected</div>

  <!-- Week filter strip (always visible) -->
  <div class="week-strip" id="week-strip">
    <button class="week-btn" id="week-prev" title="Previous week">&#x2039;</button>
    <span class="week-label" id="week-label"></span>
    <button class="week-btn" id="week-next" title="Next week">&#x203A;</button>
    <button class="week-all-btn" id="week-all">All</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">Loading board...</div>

  <!-- Mobile: single column card list -->
  <div class="card-list-container" id="card-list-container">
    <div class="pull-indicator" id="pull-indicator">Pull to refresh</div>
    <div class="card-list" id="card-list"></div>
  </div>

  <!-- Desktop: multi-column board -->
  <div class="desktop-board" id="desktop-board">
    <div class="column col-backlog" data-status="backlog">
      <div class="column-header"><span class="column-title">Backlog</span><span class="column-count" id="dcount-backlog">0</span></div>
      <div class="column-body" id="dcol-backlog"></div>
    </div>
    <div class="column col-todo" data-status="todo">
      <div class="column-header"><span class="column-title">To Do</span><span class="column-count" id="dcount-todo">0</span></div>
      <div class="column-body" id="dcol-todo"></div>
    </div>
    <div class="column col-in_progress" data-status="in_progress">
      <div class="column-header"><span class="column-title">In Progress</span><span class="column-count" id="dcount-in_progress">0</span></div>
      <div class="column-body" id="dcol-in_progress"></div>
    </div>
    <div class="column col-review" data-status="review">
      <div class="column-header"><span class="column-title">Review</span><span class="column-count" id="dcount-review">0</span></div>
      <div class="column-body" id="dcol-review"></div>
    </div>
    <div class="column col-done" data-status="done">
      <div class="column-header"><span class="column-title">Done</span><span class="column-count" id="dcount-done">0</span></div>
      <div class="column-body" id="dcol-done"></div>
    </div>
  </div>

  <!-- Mobile tab bar -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-bar-btn active" data-status="backlog">
      <span class="tab-icon">&#x1F4CB;</span>
      <span class="tab-label">Backlog</span>
      <span class="tab-count" id="tcount-backlog">0</span>
    </button>
    <button class="tab-bar-btn" data-status="todo">
      <span class="tab-icon">&#x2705;</span>
      <span class="tab-label">To Do</span>
      <span class="tab-count" id="tcount-todo">0</span>
    </button>
    <button class="tab-bar-btn" data-status="in_progress">
      <span class="tab-icon">&#x1F525;</span>
      <span class="tab-label">Active</span>
      <span class="tab-count" id="tcount-in_progress">0</span>
    </button>
    <button class="tab-bar-btn" data-status="review">
      <span class="tab-icon">&#x1F50D;</span>
      <span class="tab-label">Review</span>
      <span class="tab-count" id="tcount-review">0</span>
    </button>
    <button class="tab-bar-btn" data-status="done">
      <span class="tab-icon">&#x1F389;</span>
      <span class="tab-label">Done</span>
      <span class="tab-count" id="tcount-done">0</span>
    </button>
  </div>

  <!-- FAB for new item (mobile) -->
  <button class="fab" id="fab-new" title="New item">+</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">New Work Item</h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-field" style="margin-bottom:14px">
        <label>Title</label>
        <input type="text" id="m-title" placeholder="What needs to be done?">
      </div>
      <div class="modal-field" style="margin-bottom:14px">
        <label>Description</label>
        <textarea id="m-desc" placeholder="Add details..."></textarea>
      </div>
      <div class="modal-row">
        <div class="modal-field"><label>Project</label><select id="m-project"></select></div>
        <div class="modal-field"><label>Status</label>
          <select id="m-status">
            <option value="backlog">Backlog</option><option value="todo">To Do</option>
            <option value="in_progress">In Progress</option><option value="review">Review</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field"><label>Priority</label>
          <select id="m-priority">
            <option value="critical">Critical</option><option value="high">High</option>
            <option value="medium" selected>Medium</option><option value="low">Low</option>
          </select>
        </div>
        <div class="modal-field"><label>Assignee</label><input type="text" id="m-assignee" placeholder="Name"></div>
      </div>
      <div class="modal-row">
        <div class="modal-field"><label>Due Date</label><input type="date" id="m-due"></div>
        <div class="modal-field"></div>
      </div>
      <div class="modal-field">
        <label>Labels</label>
        <div class="modal-labels" id="m-labels"></div>
      </div>
      <div class="comments-section" id="comments-section" style="display:none">
        <h3>Comments</h3>
        <div id="comments-list"></div>
        <div class="comment-input-row">
          <input type="text" id="comment-input" placeholder="Add a comment...">
          <button class="btn btn-primary" id="btn-add-comment" style="min-height:40px">Add</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-delete" id="btn-delete-item" style="display:none">Delete</button>
        <button class="btn" id="btn-cancel-modal">Cancel</button>
        <button class="btn btn-primary" id="btn-save-modal">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   SUPABASE INIT
   ================================================================ */
var SUPABASE_URL = 'https://hzqqvbvhnzmgqivfigej.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6cXF2YnZobnptZ3FpdmZpZ2VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODgyMDAsImV4cCI6MjA5MDA2NDIwMH0.HDOqsE6Um5EKq-6cvySeo4iWUII92o05YE7gXZDYN_0';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================================================================
   STATE
   ================================================================ */
var allItems = [], allProjects = [], allLabels = [];
var currentProject = 'all', searchQuery = '', priorityFilter = 'all', typeFilter = 'all';
var editingItem = null;
var activeTab = 'backlog';
var weekStart = null; /* set in INIT after getMonday is defined */
var isOnline = navigator.onLine;
var STATUSES = ['backlog', 'todo', 'in_progress', 'review', 'done'];
var STATUS_LABELS = { backlog: 'Backlog', todo: 'To Do', in_progress: 'In Progress', review: 'Review', done: 'Done' };

/* ================================================================
   HELPERS
   ================================================================ */
function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast ' + (type || 'success');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}
async function getHeaders() {
  var s = await sb.auth.getSession();
  var t = (s.data.session && s.data.session.access_token);
  if (!t) throw new Error('Not authenticated');
  return { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' };
}

/* Week helpers */
function getMonday(date) {
  var d = new Date(date); d.setHours(0, 0, 0, 0);
  var day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
  return d;
}
function formatWeekLabel(mon) {
  var ms = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var sun = new Date(mon); sun.setDate(sun.getDate() + 6);
  if (mon.getMonth() === sun.getMonth()) {
    return ms[mon.getMonth()] + ' ' + mon.getDate() + ' — ' + sun.getDate() + ', ' + sun.getFullYear();
  }
  return ms[mon.getMonth()] + ' ' + mon.getDate() + ' — ' + ms[sun.getMonth()] + ' ' + sun.getDate() + ', ' + sun.getFullYear();
}
function updateWeekStrip() {
  var label = document.getElementById('week-label');
  var allBtn = document.getElementById('week-all');
  if (weekStart === null) {
    label.textContent = 'All Weeks';
    allBtn.classList.add('active');
  } else {
    label.textContent = formatWeekLabel(weekStart);
    allBtn.classList.remove('active');
  }
}

/* ================================================================
   OFFLINE / ONLINE
   ================================================================ */
function updateOnlineStatus() {
  isOnline = navigator.onLine;
  document.getElementById('offline-bar').classList.toggle('visible', !isOnline);
}
window.addEventListener('online', function() {
  updateOnlineStatus();
  toast('Back online — syncing...', 'success');
  loadAll();
});
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

/* Offline mutation queue */
async function queueMutation(url, method, headers, body) {
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'QUEUE_MUTATION',
      payload: { url: url, method: method, headers: headers, body: body, timestamp: Date.now() }
    });
    // Request background sync
    if ('SyncManager' in window) {
      var reg = await navigator.serviceWorker.ready;
      try { await reg.sync.register('sync-mutations'); } catch (e) { /* fallback */ }
    }
  }
}

/* ================================================================
   SERVICE WORKER REGISTRATION
   ================================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(err) {
      console.warn('SW registration failed:', err);
    });
  });
}

/* ================================================================
   AUTH
   ================================================================ */
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = 'Signing in...'; err.style.display = 'none';
  var res = await sb.auth.signInWithPassword({
    email: document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-password').value
  });
  if (res.error) {
    err.textContent = res.error.message; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In'; return;
  }
  showApp(); loadAll();
});

function handleLogout() {
  sb.auth.signOut().then(function() {
    document.getElementById('login-overlay').classList.remove('hidden');
    document.getElementById('app').classList.remove('visible');
    document.getElementById('app').style.display = 'none';
  });
}
document.getElementById('btn-logout-mobile').addEventListener('click', handleLogout);
document.getElementById('btn-logout-desktop').addEventListener('click', handleLogout);

async function checkSession() {
  var s = await sb.auth.getSession();
  if (s.data.session) { showApp(); loadAll(); }
}
function showApp() {
  document.getElementById('login-overlay').classList.add('hidden');
  var app = document.getElementById('app');
  app.style.display = 'flex';
  app.classList.add('visible');
}

/* ================================================================
   DATA LOADING
   ================================================================ */
async function loadAll() {
  try {
    var h = await getHeaders();
    var [pRes, lRes, iRes] = await Promise.all([
      fetch(SUPABASE_URL + '/rest/v1/projects?select=id,name,icon,archived&archived=eq.false&order=name', { headers: h }),
      fetch(SUPABASE_URL + '/rest/v1/labels?select=id,name,color,project_id&order=name', { headers: h }),
      fetch(SUPABASE_URL + '/rest/v1/kanban_board_view?select=*&order=sort_order', { headers: h })
    ]);
    if (!pRes.ok || !lRes.ok || !iRes.ok) throw new Error('Failed to load data');
    allProjects = await pRes.json();
    allLabels = await lRes.json();
    allItems = await iRes.json();
    populateProjectSelect();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('card-list-container').style.display = 'block';
    renderMobileList();
    renderDesktopBoard();
  } catch (err) {
    toast('Load error: ' + err.message, 'error');
  }
}

function populateProjectSelect() {
  var sel = document.getElementById('project-select');
  var mSel = document.getElementById('m-project');
  sel.innerHTML = '<option value="all">All Projects</option>';
  mSel.innerHTML = '';
  allProjects.forEach(function(p) {
    sel.innerHTML += '<option value="' + p.id + '">' + esc((p.icon||'') + ' ' + p.name) + '</option>';
    mSel.innerHTML += '<option value="' + p.id + '">' + esc((p.icon||'') + ' ' + p.name) + '</option>';
  });
}

function filterItems() {
  return allItems.filter(function(item) {
    if (currentProject !== 'all' && item.project_id !== currentProject) return false;
    if (priorityFilter !== 'all' && item.priority !== priorityFilter) return false;
    if (typeFilter !== 'all' && item.type !== typeFilter) return false;
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      if ((item.title||'').toLowerCase().indexOf(q) === -1 &&
          (item.description||'').toLowerCase().indexOf(q) === -1 &&
          (item.project_name||'').toLowerCase().indexOf(q) === -1) return false;
    }
    /* Week filter: hide cards with a due_date outside the selected week; undated cards always pass */
    if (weekStart !== null && item.due_date) {
      var d = new Date(item.due_date + 'T00:00:00');
      var weekEnd = new Date(weekStart);
      weekEnd.setDate(weekEnd.getDate() + 6);
      weekEnd.setHours(23, 59, 59, 999);
      if (d < weekStart || d > weekEnd) return false;
    }
    return true;
  });
}

/* ================================================================
   MOBILE RENDERING
   ================================================================ */
function renderMobileList() {
  var filtered = filterItems();
  var items = filtered.filter(function(i) { return i.status === activeTab; });
  items.sort(function(a, b) { return a.sort_order - b.sort_order; });

  // Update tab counts
  STATUSES.forEach(function(st) {
    var count = filtered.filter(function(i) { return i.status === st; }).length;
    var el = document.getElementById('tcount-' + st);
    if (el) el.textContent = count;
  });

  var list = document.getElementById('card-list');
  var statusIdx = STATUSES.indexOf(activeTab);
  var prevStatus = statusIdx > 0 ? STATUS_LABELS[STATUSES[statusIdx - 1]] : null;
  var nextStatus = statusIdx < STATUSES.length - 1 ? STATUS_LABELS[STATUSES[statusIdx + 1]] : null;

  var html = '';
  // Column header
  html += '<div class="list-column-header">';
  html += '<span class="list-column-title" style="color:' + getStatusColor(activeTab) + '">' + esc(STATUS_LABELS[activeTab]) + '</span>';
  html += '<span class="list-column-count">' + items.length + '</span>';
  html += '</div>';

  if (!items.length) {
    html += '<div class="empty-column">No items in ' + esc(STATUS_LABELS[activeTab]) + '</div>';
  }

  items.forEach(function(item) {
    html += buildCardHTML(item, prevStatus, nextStatus);
  });

  list.innerHTML = html;
  list.scrollTop = 0;
  bindMobileCardEvents();
}

function getStatusColor(st) {
  var colors = { backlog: '#8b949e', todo: '#58a6ff', in_progress: '#8b5cf6', review: '#d29922', done: '#3fb950' };
  return colors[st] || '#8b949e';
}

function buildCardHTML(item, prevLabel, nextLabel) {
  var labels = '';
  if (item.labels && item.labels.length) {
    item.labels.forEach(function(lb) {
      labels += '<span class="card-label" style="background:' + esc(lb.color) + '">' + esc(lb.name) + '</span>';
    });
  }
  var dueHtml = '';
  if (item.due_date) {
    var isOverdue = new Date(item.due_date) < new Date() && item.status !== 'done';
    dueHtml = '<span class="card-due' + (isOverdue ? ' overdue' : '') + '">&#128197; ' + item.due_date + '</span>';
  }
  var commentHtml = item.comment_count > 0 ? '<span class="card-comments">&#128172; ' + item.comment_count + '</span>' : '';
  var assigneeHtml = item.assignee ? '<span class="card-assignee">' + esc(item.assignee) + '</span>' : '';
  var descHtml = item.description ? '<div class="card-description">' + esc(item.description) + '</div>' : '';

  var html = '<div class="card" data-id="' + item.id + '">';
  html += '<div class="swipe-action left">' + (prevLabel ? '&#x25C0; ' + esc(prevLabel) : '') + '</div>';
  html += '<div class="swipe-action right">' + (nextLabel ? esc(nextLabel) + ' &#x25B6;' : '') + '</div>';
  var typeHtml = '';
  if (item.type && item.type !== 'task') {
    var typeIcons = {bug:'🐛',user_story:'📖',requirement:'📋',spike:'🔍',chore:'🧹',epic:'🏔️'};
    var typeLabels = {bug:'bug',user_story:'story',requirement:'req',spike:'spike',chore:'chore',epic:'epic'};
    typeHtml = '<span class="card-type-badge type-' + item.type + '">' + (typeIcons[item.type]||'') + ' ' + (typeLabels[item.type]||item.type) + '</span>';
  }

  html += '<div class="card-inner">';
  html += '<div class="card-meta"><span class="priority-dot priority-' + esc(item.priority) + '" title="' + esc(item.priority) + '"></span>' + typeHtml;
  html += '<span class="card-project-tag">' + esc((item.project_icon||'') + ' ' + (item.project_name||'')) + '</span>';
  html += assigneeHtml + '</div>';
  if (labels) html += '<div class="card-labels">' + labels + '</div>';
  html += '<div class="card-title">' + esc(item.title) + '</div>';
  html += descHtml;
  if (dueHtml || commentHtml) html += '<div class="card-footer">' + dueHtml + commentHtml + '</div>';
  html += '</div></div>';
  return html;
}

/* ================================================================
   MOBILE CARD EVENTS — Swipe & Long-press
   ================================================================ */
function bindMobileCardEvents() {
  document.querySelectorAll('#card-list .card').forEach(function(el) {
    var startX = 0, startY = 0, currentX = 0, swiping = false, longPressTimer = null;
    var SWIPE_THRESHOLD = 80;
    var cardInner = el.querySelector('.card-inner');

    // Long press to edit
    el.addEventListener('touchstart', function(e) {
      var touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      currentX = 0;
      swiping = false;

      longPressTimer = setTimeout(function() {
        // Haptic pulse
        el.classList.add('haptic');
        setTimeout(function() { el.classList.remove('haptic'); }, 150);
        openModal(el.dataset.id);
        longPressTimer = null;
      }, 500);
    }, { passive: true });

    el.addEventListener('touchmove', function(e) {
      var touch = e.touches[0];
      var dx = touch.clientX - startX;
      var dy = touch.clientY - startY;

      // If scrolling vertically, cancel swipe
      if (Math.abs(dy) > Math.abs(dx) && !swiping) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        return;
      }

      // Start swiping horizontally
      if (Math.abs(dx) > 10) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        swiping = true;
        el.classList.add('swiping');
        currentX = dx;

        // Apply transform
        var translate = Math.max(-120, Math.min(120, dx));
        cardInner.style.transform = 'translateX(' + translate + 'px)';

        // Visual feedback classes
        el.classList.toggle('swipe-right', dx > SWIPE_THRESHOLD);
        el.classList.toggle('swipe-left', dx < -SWIPE_THRESHOLD);
      }
    }, { passive: true });

    el.addEventListener('touchend', function(e) {
      clearTimeout(longPressTimer);
      longPressTimer = null;

      if (swiping) {
        el.classList.remove('swiping', 'swipe-right', 'swipe-left');
        cardInner.style.transform = '';

        if (currentX > SWIPE_THRESHOLD) {
          // Swipe right — advance status
          moveCardBySwipe(el.dataset.id, 1);
        } else if (currentX < -SWIPE_THRESHOLD) {
          // Swipe left — move back
          moveCardBySwipe(el.dataset.id, -1);
        }
        swiping = false;
      } else if (!swiping && Math.abs(currentX) < 10) {
        // Tap — toggle description visibility
        var desc = el.querySelector('.card-description');
        if (desc && desc.textContent) {
          var isExpanded = desc.style.webkitLineClamp === 'unset';
          desc.style.webkitLineClamp = isExpanded ? '2' : 'unset';
        }
      }
    }, { passive: true });

    el.addEventListener('touchcancel', function() {
      clearTimeout(longPressTimer);
      longPressTimer = null;
      el.classList.remove('swiping', 'swipe-right', 'swipe-left');
      cardInner.style.transform = '';
      swiping = false;
    }, { passive: true });
  });
}

async function moveCardBySwipe(itemId, direction) {
  var item = allItems.find(function(i) { return i.id === itemId; });
  if (!item) return;
  var idx = STATUSES.indexOf(item.status);
  var newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= STATUSES.length) {
    toast('Already at ' + (direction < 0 ? 'first' : 'last') + ' status', 'error');
    return;
  }
  var newStatus = STATUSES[newIdx];

  try {
    var h = await getHeaders();
    var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/move_work_item', {
      method: 'POST', headers: h,
      body: JSON.stringify({ p_item_id: itemId, p_new_status: newStatus, p_new_sort_order: 0 })
    });
    if (!res.ok) {
      if (!isOnline) {
        // Queue for sync
        await queueMutation(
          SUPABASE_URL + '/rest/v1/rpc/move_work_item',
          'POST', h,
          JSON.stringify({ p_item_id: itemId, p_new_status: newStatus, p_new_sort_order: 0 })
        );
        // Optimistic update
        item.status = newStatus;
        renderMobileList();
        renderDesktopBoard();
        toast('Queued: move to ' + STATUS_LABELS[newStatus], 'success');
        return;
      }
      throw new Error(await res.text());
    }
    item.status = newStatus;
    item.sort_order = 0;
    renderMobileList();
    renderDesktopBoard();
    toast('Moved to ' + STATUS_LABELS[newStatus], 'success');
  } catch (err) {
    toast('Move failed: ' + err.message, 'error');
  }
}

/* ================================================================
   DESKTOP BOARD RENDERING (drag & drop)
   ================================================================ */
var dragItem = null;

function renderDesktopBoard() {
  var filtered = filterItems();
  STATUSES.forEach(function(st) {
    var col = document.getElementById('dcol-' + st);
    if (!col) return;
    var items = filtered.filter(function(i) { return i.status === st; });
    items.sort(function(a, b) { return a.sort_order - b.sort_order; });
    var countEl = document.getElementById('dcount-' + st);
    if (countEl) countEl.textContent = items.length;

    var html = '';
    items.forEach(function(item) {
      var labels = '';
      if (item.labels && item.labels.length) {
        item.labels.forEach(function(lb) {
          labels += '<span class="card-label" style="background:' + esc(lb.color) + '">' + esc(lb.name) + '</span>';
        });
      }
      var dueHtml = '';
      if (item.due_date) {
        var isOverdue = new Date(item.due_date) < new Date() && st !== 'done';
        dueHtml = '<span class="card-due' + (isOverdue ? ' overdue' : '') + '">&#128197; ' + item.due_date + '</span>';
      }
      var commentHtml = item.comment_count > 0 ? '<span class="card-comments">&#128172; ' + item.comment_count + '</span>' : '';
      var typeHtml = '';
      if (item.type && item.type !== 'task') {
        var typeIcons = {bug:'🐛',user_story:'📖',requirement:'📋',spike:'🔍',chore:'🧹',epic:'🏔️'};
        var typeLabels = {bug:'bug',user_story:'story',requirement:'req',spike:'spike',chore:'chore',epic:'epic'};
        typeHtml = '<span class="card-type-badge type-' + item.type + '">' + (typeIcons[item.type]||'') + ' ' + (typeLabels[item.type]||item.type) + '</span>';
      }
      html += '<div class="card" draggable="true" data-id="' + item.id + '">';
      html += '<div class="card-meta"><span class="priority-dot priority-' + esc(item.priority) + '"></span>' + typeHtml;
      html += '<span class="card-project-tag">' + esc((item.project_icon||'') + ' ' + (item.project_name||'')) + '</span></div>';
      if (labels) html += '<div class="card-labels">' + labels + '</div>';
      html += '<div class="card-title">' + esc(item.title) + '</div>';
      if (dueHtml || commentHtml) html += '<div class="card-footer">' + dueHtml + commentHtml + '</div>';
      html += '</div>';
    });
    html += '<button class="add-card-btn" data-status="' + st + '">+ Add card</button>';
    col.innerHTML = html;
  });
  bindDesktopCardEvents();
}

function bindDesktopCardEvents() {
  document.querySelectorAll('#desktop-board .card').forEach(function(el) {
    el.addEventListener('click', function() { openModal(el.dataset.id); });
    el.addEventListener('dragstart', function(e) {
      dragItem = el.dataset.id;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', function() {
      el.classList.remove('dragging');
      dragItem = null;
    });
  });
  document.querySelectorAll('#desktop-board .column-body').forEach(function(col) {
    col.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });
    col.addEventListener('drop', async function(e) {
      e.preventDefault();
      if (!dragItem) return;
      var newStatus = col.id.replace('dcol-', '');
      var cards = col.querySelectorAll('.card');
      var newOrder = cards.length;
      try {
        var h = await getHeaders();
        var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/move_work_item', {
          method: 'POST', headers: h,
          body: JSON.stringify({ p_item_id: dragItem, p_new_status: newStatus, p_new_sort_order: newOrder })
        });
        if (!res.ok) throw new Error(await res.text());
        for (var i = 0; i < allItems.length; i++) {
          if (allItems[i].id === dragItem) { allItems[i].status = newStatus; allItems[i].sort_order = newOrder; break; }
        }
        renderMobileList();
        renderDesktopBoard();
        toast('Moved to ' + STATUS_LABELS[newStatus], 'success');
      } catch (err) { toast('Move failed: ' + err.message, 'error'); }
    });
  });
  document.querySelectorAll('#desktop-board .add-card-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { openNewModal(btn.dataset.status); });
  });
}

/* ================================================================
   TAB BAR
   ================================================================ */
document.querySelectorAll('.tab-bar-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-bar-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeTab = btn.dataset.status;
    renderMobileList();
  });
});

/* ================================================================
   PULL-TO-REFRESH
   ================================================================ */
(function() {
  var cardList = document.getElementById('card-list');
  var pullIndicator = document.getElementById('pull-indicator');
  var pullStartY = 0, pulling = false;

  cardList.addEventListener('touchstart', function(e) {
    if (cardList.scrollTop <= 0) {
      pullStartY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  cardList.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - pullStartY;
    if (dy > 60 && cardList.scrollTop <= 0) {
      pullIndicator.classList.add('visible');
      pullIndicator.textContent = dy > 120 ? 'Release to refresh' : 'Pull to refresh';
    }
  }, { passive: true });

  cardList.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    if (pullIndicator.classList.contains('visible') && pullIndicator.textContent === 'Release to refresh') {
      pullIndicator.textContent = 'Refreshing...';
      loadAll().then(function() {
        pullIndicator.classList.remove('visible');
      });
    } else {
      pullIndicator.classList.remove('visible');
    }
  }, { passive: true });
})();

/* ================================================================
   FILTER TOGGLE
   ================================================================ */
document.getElementById('toggle-filters').addEventListener('click', function() {
  var panel = document.getElementById('filters-panel');
  var btn = this;
  panel.classList.toggle('open');
  btn.classList.toggle('active', panel.classList.contains('open'));
});

/* ================================================================
   MODAL
   ================================================================ */
function openNewModal(status) {
  editingItem = null;
  document.getElementById('modal-title').textContent = 'New Work Item';
  document.getElementById('m-title').value = '';
  document.getElementById('m-desc').value = '';
  document.getElementById('m-status').value = status || activeTab || 'backlog';
  document.getElementById('m-priority').value = 'medium';
  document.getElementById('m-assignee').value = '';
  document.getElementById('m-due').value = '';
  if (currentProject !== 'all') document.getElementById('m-project').value = currentProject;
  document.getElementById('btn-delete-item').style.display = 'none';
  document.getElementById('comments-section').style.display = 'none';
  renderLabelChips([]);
  document.getElementById('modal-overlay').classList.add('active');
}

async function openModal(itemId) {
  var item = allItems.find(function(i) { return i.id === itemId; });
  if (!item) return;
  editingItem = item;
  document.getElementById('modal-title').textContent = 'Edit Work Item';
  document.getElementById('m-title').value = item.title || '';
  document.getElementById('m-desc').value = item.description || '';
  document.getElementById('m-project').value = item.project_id;
  document.getElementById('m-status').value = item.status;
  document.getElementById('m-priority').value = item.priority;
  document.getElementById('m-assignee').value = item.assignee || '';
  document.getElementById('m-due').value = item.due_date || '';
  document.getElementById('btn-delete-item').style.display = 'inline-flex';
  var selectedLabelIds = (item.labels || []).map(function(l) { return l.id; });
  renderLabelChips(selectedLabelIds);
  document.getElementById('comments-section').style.display = 'block';
  await loadComments(itemId);
  document.getElementById('modal-overlay').classList.add('active');
}

function renderLabelChips(selectedIds) {
  var container = document.getElementById('m-labels');
  container.innerHTML = '';
  allLabels.forEach(function(lb) {
    var sel = selectedIds.indexOf(lb.id) !== -1;
    var chip = document.createElement('span');
    chip.className = 'label-chip' + (sel ? ' selected' : '');
    chip.style.background = lb.color;
    chip.textContent = lb.name;
    chip.dataset.id = lb.id;
    chip.addEventListener('click', function() { chip.classList.toggle('selected'); });
    container.appendChild(chip);
  });
}

async function loadComments(itemId) {
  var list = document.getElementById('comments-list');
  list.innerHTML = '<div style="color:var(--text-dim);font-size:12px">Loading...</div>';
  try {
    var h = await getHeaders();
    var res = await fetch(SUPABASE_URL + '/rest/v1/work_item_comments?work_item_id=eq.' + itemId + '&order=created_at.desc', { headers: h });
    var comments = await res.json();
    if (!comments.length) { list.innerHTML = '<div style="color:var(--text-dim);font-size:12px">No comments yet</div>'; return; }
    list.innerHTML = '';
    comments.forEach(function(c) {
      list.innerHTML += '<div class="comment"><div class="comment-body">' + esc(c.body) + '</div><div class="comment-date">' + new Date(c.created_at).toLocaleString() + '</div></div>';
    });
  } catch (e) {
    list.innerHTML = '<div style="color:var(--accent-red);font-size:12px">Failed to load</div>';
  }
}

document.getElementById('btn-add-comment').addEventListener('click', async function() {
  if (!editingItem) return;
  var input = document.getElementById('comment-input');
  var body = input.value.trim();
  if (!body) return;
  try {
    var h = await getHeaders();
    var res = await fetch(SUPABASE_URL + '/rest/v1/work_item_comments', {
      method: 'POST', headers: Object.assign({}, h, { 'Prefer': 'return=representation' }),
      body: JSON.stringify({ work_item_id: editingItem.id, body: body })
    });
    if (!res.ok) throw new Error('Failed');
    input.value = '';
    await loadComments(editingItem.id);
    for (var i = 0; i < allItems.length; i++) {
      if (allItems[i].id === editingItem.id) { allItems[i].comment_count = (allItems[i].comment_count || 0) + 1; break; }
    }
    renderMobileList();
    renderDesktopBoard();
  } catch (e) { toast('Comment failed: ' + e.message, 'error'); }
});

/* Save */
document.getElementById('btn-save-modal').addEventListener('click', async function() {
  var title = document.getElementById('m-title').value.trim();
  if (!title) { toast('Title is required', 'error'); return; }
  var data = {
    title: title,
    description: document.getElementById('m-desc').value.trim() || null,
    project_id: document.getElementById('m-project').value,
    status: document.getElementById('m-status').value,
    priority: document.getElementById('m-priority').value,
    assignee: document.getElementById('m-assignee').value.trim() || null,
    due_date: document.getElementById('m-due').value || null,
    updated_at: new Date().toISOString()
  };
  var selectedLabels = [];
  document.querySelectorAll('#m-labels .label-chip.selected').forEach(function(c) { selectedLabels.push(c.dataset.id); });

  try {
    var h = await getHeaders();
    var itemId;
    if (editingItem) {
      var res = await fetch(SUPABASE_URL + '/rest/v1/work_items?id=eq.' + editingItem.id, {
        method: 'PATCH', headers: Object.assign({}, h, { 'Prefer': 'return=representation' }),
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('Update failed');
      itemId = editingItem.id;
    } else {
      data.sort_order = allItems.filter(function(i) { return i.status === data.status; }).length;
      var res = await fetch(SUPABASE_URL + '/rest/v1/work_items', {
        method: 'POST', headers: Object.assign({}, h, { 'Prefer': 'return=representation' }),
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('Create failed');
      var rows = await res.json();
      itemId = rows[0].id;
    }
    await fetch(SUPABASE_URL + '/rest/v1/work_item_labels?work_item_id=eq.' + itemId, { method: 'DELETE', headers: h });
    if (selectedLabels.length) {
      var labelRows = selectedLabels.map(function(lid) { return { work_item_id: itemId, label_id: lid }; });
      await fetch(SUPABASE_URL + '/rest/v1/work_item_labels', {
        method: 'POST', headers: h, body: JSON.stringify(labelRows)
      });
    }
    closeModal();
    toast(editingItem ? 'Updated' : 'Created', 'success');
    await loadAll();
  } catch (err) { toast('Save error: ' + err.message, 'error'); }
});

/* Delete */
document.getElementById('btn-delete-item').addEventListener('click', async function() {
  if (!editingItem || !confirm('Delete this work item?')) return;
  try {
    var h = await getHeaders();
    var res = await fetch(SUPABASE_URL + '/rest/v1/work_items?id=eq.' + editingItem.id, { method: 'DELETE', headers: h });
    if (!res.ok) throw new Error('Delete failed');
    closeModal();
    toast('Deleted', 'success');
    await loadAll();
  } catch (err) { toast('Delete error: ' + err.message, 'error'); }
});

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  editingItem = null;
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

/* ================================================================
   FILTERS
   ================================================================ */
document.getElementById('project-select').addEventListener('change', function() {
  currentProject = this.value;
  renderMobileList();
  renderDesktopBoard();
});
document.getElementById('priority-filter').addEventListener('change', function() {
  priorityFilter = this.value;
  renderMobileList();
  renderDesktopBoard();
});
document.getElementById('type-filter').addEventListener('change', function() {
  typeFilter = this.value;
  renderMobileList();
  renderDesktopBoard();
});
document.getElementById('search-input').addEventListener('input', function() {
  searchQuery = this.value;
  renderMobileList();
  renderDesktopBoard();
});

/* Week filter navigation */
document.getElementById('week-prev').addEventListener('click', function() {
  if (weekStart === null) weekStart = getMonday(new Date());
  weekStart = new Date(weekStart); weekStart.setDate(weekStart.getDate() - 7);
  updateWeekStrip(); renderMobileList(); renderDesktopBoard();
});
document.getElementById('week-next').addEventListener('click', function() {
  if (weekStart === null) weekStart = getMonday(new Date());
  weekStart = new Date(weekStart); weekStart.setDate(weekStart.getDate() + 7);
  updateWeekStrip(); renderMobileList(); renderDesktopBoard();
});
document.getElementById('week-all').addEventListener('click', function() {
  weekStart = null;
  updateWeekStrip(); renderMobileList(); renderDesktopBoard();
});

/* New item buttons */
document.getElementById('fab-new').addEventListener('click', function() { openNewModal(activeTab); });
document.getElementById('btn-new-desktop').addEventListener('click', function() { openNewModal('backlog'); });
document.getElementById('btn-refresh').addEventListener('click', loadAll);

/* ================================================================
   STANDALONE MODE DETECTION
   ================================================================ */
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  document.documentElement.classList.add('standalone');
}

/* ================================================================
   INIT
   ================================================================ */
/* Default to this week */
weekStart = getMonday(new Date());
updateWeekStrip();
checkSession();
</script>
